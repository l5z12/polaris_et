name: Release

# Publish a GitHub Release (x64 + arm64) whenever a version tag is pushed, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read # the build job needs no write; the release job opts in below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read # find & download the Build workflow's prebuilt artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            tpdir: x86_64 # easytier/third_party/<tpdir> — Npcap Packet.dll/.lib
          - arch: arm64
            target: aarch64-pc-windows-msvc # cross-compiled on the x64 runner
            tpdir: arm64
    steps:
      - uses: actions/checkout@v4

      # Tags are normally pushed on a commit the Build workflow already compiled,
      # so reuse that exact-commit artifact and skip the slow cargo build. Falls
      # back to building from source if there's no usable prebuilt payload.
      - name: Reuse prebuilt payload
        id: reuse
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $sha = "${{ github.sha }}"
          $runId = gh api `
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?head_sha=$sha&status=success&per_page=1" `
            --jq ".workflow_runs[0].id // empty"
          $reused = "false"
          if ($runId) {
            Remove-Item payload -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force payload | Out-Null
            try {
              gh run download $runId --pattern "polaris-*-${{ matrix.arch }}-*" --dir payload
              # gh nests each artifact under its own dir — flatten into payload/.
              Get-ChildItem payload -Recurse -File | Move-Item -Destination payload -Force
              Get-ChildItem payload -Directory | Remove-Item -Recurse -Force
            } catch { Write-Host "artifact download failed: $_" }
            # Only reuse if the payload is complete (guards against an older
            # build.yml that shipped a different file set for this commit).
            $need = 'polaris_et.exe','wintun.dll','Microsoft.WindowsAppRuntime.Bootstrap.dll','resources.pri','Packet.dll'
            $missing = $need | Where-Object { -not (Test-Path "payload/$_") }
            if (-not $missing) {
              $reused = "true"; Write-Host "Reusing Build run $runId for $sha"
            } else {
              Write-Host "Prebuilt payload incomplete (missing: $($missing -join ', ')); rebuilding"
            }
          } else {
            Write-Host "No successful Build run for $sha; building from source"
          }
          "reused=$reused" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: ./.github/actions/setup
        if: steps.reuse.outputs.reused != 'true'
        with:
          target: ${{ matrix.target }}

      - name: Build (release)
        if: steps.reuse.outputs.reused != 'true'
        shell: pwsh
        # First run is slow: compiles the EasyTier core and the windows-rs crates
        # from git and downloads the Windows App SDK payloads.
        run: |
          cargo build --release --bin polaris_et --target ${{ matrix.target }}
          if ($LASTEXITCODE -ne 0) { throw "cargo build failed" }
          $out = "target/${{ matrix.target }}/release"
          Remove-Item payload -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force payload | Out-Null
          # Must match build.yml's dist/ exactly — release reuses that artifact.
          Copy-Item "$out/polaris_et.exe","$out/wintun.dll","$out/Microsoft.WindowsAppRuntime.Bootstrap.dll","$out/resources.pri" payload/
          Copy-Item "easytier/third_party/${{ matrix.tpdir }}/Packet.dll" payload/
          Copy-Item LICENSE,README.md,CREDITS.md payload/

      - name: Package (zip)
        shell: pwsh
        run: |
          $stage = "polaris-${{ github.ref_name }}-${{ matrix.arch }}"
          Compress-Archive -Path "payload/*" -DestinationPath "$stage.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = (Get-Command iscc.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) { $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          $stage    = "polaris-${{ github.ref_name }}-${{ matrix.arch }}"
          $ver      = "${{ github.ref_name }}".TrimStart('v') # 0.1.0 / 0.1.0-rc1
          $verNum   = ($ver -split '-')[0]                    # numeric VERSIONINFO
          $archSpec = if ("${{ matrix.arch }}" -eq "arm64") { "arm64" } else { "x64os" }
          # Simplified-Chinese wizard translation (unofficial, kira-96). Best
          # effort — the installer falls back to English-only if it can't fetch.
          $isl = Join-Path (Get-Location) "ChineseSimplified.isl"
          try {
            Invoke-WebRequest -UseBasicParsing -OutFile $isl `
              "https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/main/ChineseSimplified.isl"
          } catch { Write-Host "Chinese .isl download failed: $_" }
          $isccArgs = @(
            "/Qp",
            "/DAppVersion=$ver",
            "/DVersionInfo=$verNum",
            "/DArch=${{ matrix.arch }}",
            "/DArchSpec=$archSpec",
            "/DSourceDir=$((Resolve-Path payload).Path)",
            "/DOutputDir=$((Get-Location).Path)",
            "/DOutputBase=$stage-setup"
          )
          if (Test-Path $isl) { $isccArgs += "/DChineseIsl=$isl" }
          $isccArgs += "packaging/polaris.iss"
          & $iscc @isccArgs
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            polaris-*-${{ matrix.arch }}.zip
            polaris-*-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest # just collects the zips and calls the API
    permissions:
      contents: write # create the release + upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # flatten dist-x64/ and dist-arm64/ into artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*-setup.exe
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v0.1.0-rc1) ship as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Pick the build for your CPU — `x64` for Intel/AMD, `arm64` for
            Windows on ARM. Two formats each:

            - `*-setup.exe` — installer (Start Menu shortcut, uninstaller).
            - `*.zip` — portable; keep every file together.

            **Requires the [Windows App SDK runtime](https://learn.microsoft.com/windows/apps/windows-app-sdk/downloads)**
            (this is a framework-dependent build). For the portable zip,
            `polaris_et.exe` needs `wintun.dll`,
            `Microsoft.WindowsAppRuntime.Bootstrap.dll`, `resources.pri`, and
            `Packet.dll` beside it. For VPN (TUN) mode, run as administrator —
            see the README.
