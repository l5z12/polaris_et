name: Release

# Publish a GitHub Release (x64 + arm64) whenever a version tag is pushed, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read # the build job needs no write; the release job opts in below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            tpdir: x86_64 # easytier/third_party/<tpdir> — Npcap Packet.dll/.lib
          - arch: arm64
            target: aarch64-pc-windows-msvc # cross-compiled on the x64 runner
            tpdir: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          target: ${{ matrix.target }}

      - name: Build (release)
        # First run is slow: compiles the EasyTier core and the windows-rs crates
        # from git and downloads the Windows App SDK payloads.
        run: cargo build --release --bin polaris_et --target ${{ matrix.target }}

      - name: Package
        shell: pwsh
        run: |
          $stage = "polaris-${{ github.ref_name }}-${{ matrix.arch }}"
          $out = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force $stage | Out-Null
          # Full runtime payload — see build.yml for what each file is for.
          Copy-Item "$out/polaris_et.exe"                          $stage/
          Copy-Item "$out/wintun.dll"                              $stage/
          Copy-Item "$out/Microsoft.WindowsAppRuntime.Bootstrap.dll" $stage/
          Copy-Item "$out/resources.pri"                           $stage/
          Copy-Item "easytier/third_party/${{ matrix.tpdir }}/Packet.dll" $stage/
          Copy-Item LICENSE, README.md, CREDITS.md                 $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = (Get-Command iscc.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) { $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          $stage    = "polaris-${{ github.ref_name }}-${{ matrix.arch }}"
          $ver      = "${{ github.ref_name }}".TrimStart('v') # 0.1.0 / 0.1.0-rc1
          $verNum   = ($ver -split '-')[0]                    # numeric VERSIONINFO
          $archSpec = if ("${{ matrix.arch }}" -eq "arm64") { "arm64" } else { "x64os" }
          & $iscc /Qp `
            "/DAppVersion=$ver" `
            "/DVersionInfo=$verNum" `
            "/DArch=${{ matrix.arch }}" `
            "/DArchSpec=$archSpec" `
            "/DSourceDir=$((Resolve-Path $stage).Path)" `
            "/DOutputDir=$((Get-Location).Path)" `
            "/DOutputBase=$stage-setup" `
            packaging/polaris.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            polaris-*-${{ matrix.arch }}.zip
            polaris-*-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest # just collects the zips and calls the API
    permissions:
      contents: write # create the release + upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # flatten dist-x64/ and dist-arm64/ into artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*-setup.exe
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v0.1.0-rc1) ship as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Pick the build for your CPU — `x64` for Intel/AMD, `arm64` for
            Windows on ARM. Two formats each:

            - `*-setup.exe` — installer (Start Menu shortcut, uninstaller).
            - `*.zip` — portable; keep every file together.

            **Requires the [Windows App SDK runtime](https://learn.microsoft.com/windows/apps/windows-app-sdk/downloads)**
            (this is a framework-dependent build). For the portable zip,
            `polaris_et.exe` needs `wintun.dll`,
            `Microsoft.WindowsAppRuntime.Bootstrap.dll`, `resources.pri`, and
            `Packet.dll` beside it. For VPN (TUN) mode, run as administrator —
            see the README.
