name: Setup Polaris build
description: Install Rust + protoc and configure the environment for building Polaris.

inputs:
  target:
    description: Rust target triple to install (and build for).
    required: true

runs:
  using: composite
  steps:
    - name: Install Rust (MSVC)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Install protoc
      shell: pwsh
      # Use Chocolatey (preinstalled on windows-latest) rather than
      # arduino/setup-protoc: that action resolves the version through GitHub's
      # /releases API, which intermittently 500s. The choco package downloads a
      # fixed release asset instead, and its shim dir is already on PATH.
      run: |
        choco install protoc --no-progress -y
        protoc --version

    - name: Configure environment
      shell: pwsh
      run: |
        # `.cargo/config.toml` is git-ignored, so set the bits the build needs as
        # env vars here. The local proxy that file also configures is NOT
        # reproduced — CI has direct network access.
        "CARGO_NET_GIT_FETCH_WITH_CLI=true" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
        "CARGO_TERM_COLOR=always"           | Out-File $env:GITHUB_ENV -Append -Encoding utf8
        # windows-reactor's build.rs locates the Windows App SDK nupkgs relative
        # to CARGO_WORKSPACE_DIR (normally injected by the windows-rs workspace,
        # absent for a git dependency). Point it at the checkout root — absolute,
        # forward slashes, trailing slash.
        $ws = "${{ github.workspace }}".Replace('\','/').TrimEnd('/') + '/'
        "CARGO_WORKSPACE_DIR=$ws" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
        # prost-build (an EasyTier dependency) needs protoc via PROTOC.
        "PROTOC=$((Get-Command protoc).Source)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

    - name: Cache cargo + target
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.target }} # keep x64 and arm64 caches separate
